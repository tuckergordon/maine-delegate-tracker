name: Diag Jackson slate

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Dump Aroostook Jackson page structure
        run: python scripts/_diag_jackson.py aroostook
